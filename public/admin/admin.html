<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - CRUD de Servicios</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="dark-layout">
    <div class="container admin-container">
      <!--ESTO LO VAS A HACER DINMÁMICO PARA QUE META LOS DATOS A LA BD-->
      <div class="header">
        <h1><i class="bi bi-gear-fill"></i> Panel de Administración</h1>
        <p>Gestión de Servicios - Empresa X</p>
      </div>

      <div class="form-card" id="serviceFormCard">
        <h2 class="form-title" id="formTitle">
          <i class="bi bi-plus-circle"></i> Nuevo Servicio
        </h2>

        <form id="crudForm" action="/service" method="post">
          <input type="hidden" id="serviceId" name="id" />

          <div class="form-group">
            <label for="nombre" class="form-label">
              Nombre del Servicio <span class="required">*</span>
            </label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              class="form-input"
              placeholder="Ej: Consultoría TI"
              required
            />
          </div>

          <div class="form-group">
            <label for="descripcion" class="form-label">
              Descripción <span class="required">*</span>
            </label>
            <textarea
              id="descripcion"
              name="descripcion"
              class="form-input"
              rows="3"
              placeholder="Detalles del servicio..."
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label for="estado" class="form-label">Estado</label>
            <select id="estado" name="estado" class="form-select">
              <option selected value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="reset" class="btn btn-secondary" id="btnCancel">
              <i class="bi bi-x-circle"></i> Cancelar
            </button>

            <!--ESTE BOTÓN USA PARA GUARDAR LOS DATOS-->
            <button type="submit" class="btn btn-primary" id="btnSave">
              <i class="bi bi-save"></i> Guardar Servicio
            </button>
          </div>
        </form>
      </div>

      <div class="services-list-container">
        <h2 class="list-title">
          <i class="bi bi-card-list"></i> Servicios Actuales
        </h2>

        <div id="servicesList"></div>
      </div>

      <div class="footer">
        <p>
          <a href="/" style="color: white; text-decoration: none"
            >← Volver al inicio estático</a
          >
        </p>
      </div>
    </div>
    <!--MODAL PA EDITAR-->
    <section id="layoutModal">
      <div class="modal-overlay" id="modalEdit">
        <div class="modal-content">
          <div class="modal-header">
            <i class="bi bi-pencil-square" style="font-size: 1.5rem"></i>
            <h2 style="margin: 0">Editar Servicio</h2>
          </div>

          <form id="formEditService" action="/service">
            <label>Id: </label>
            <input
              id="idService"
              type="number"
              name="id"
              class="form-control"
              required
            />

            <div class="form-group">
              <label>Nombre del Servicio <span>*</span></label>
              <input
                name="nombre"
                type="text"
                id="editNombre"
                class="form-control"
                required
                placeholder="Ej: Consultoría TI"
              />
            </div>

            <div class="form-group">
              <label>Descripción <span>*</span></label>
              <textarea
                name="descripcion"
                id="editDescripcion"
                class="form-control"
                rows="4"
                required
                placeholder="Detalles del servicio..."
              ></textarea>
            </div>

            <div class="form-group">
              <label>Estado</label>
              <select id="editEstado" class="form-control" name="estado">
                <option selected value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
              </select>
            </div>

            <div class="btn-group">
              <button
                type="button"
                class="btn btn-cancel"
                onclick="closeModal()"
              >
                <i class="bi bi-x-circle"></i> Cancelar
              </button>
              <button type="submit" class="btn btn-save">
                <i class="bi bi-box-arrow-in-down"></i> Actualizar Servicio
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>
    <script src="adminValidator.js"></script>
  </body>
</html>
