<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dark-layout">
    <div class="container">
      <div class="header">
        <h1><i class="bi bi-envelope-heart"></i> Contáctanos</h1>
        <p>Atención al Cliente</p>
      </div>

      <div class="form-card">
        <h2 class="form-title">
          <i class="bi bi-chat-dots"></i> Envíanos un mensaje
        </h2>

        <form id="contactForm" action="/data" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName" class="form-label">
                <i class="bi bi-person"></i> Nombre
                <span class="required">*</span>
              </label>
              <input
                type="text"
                id="firstName"
                name="firstName"
                class="form-input"
                placeholder="Ej: Juan"
                required
              />
            </div>

            <div class="form-group">
              <label for="lastName" class="form-label">
                <i class="bi bi-person"></i> Apellido
                <span class="required">*</span>
              </label>
              <input
                type="text"
                id="lastName"
                name="lastName"
                class="form-input"
                placeholder="Ej: Pérez"
                required
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email" class="form-label">
                <i class="bi bi-envelope"></i> Email
                <span class="required">*</span>
              </label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="ejemplo@correo.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="phone" class="form-label">
                <i class="bi bi-telephone"></i> Teléfono
              </label>
              <input
                type="tel"
                id="phone"
                name="phone"
                class="form-input"
                placeholder="1234-5678"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="subject" class="form-label">
              <i class="bi bi-bookmark"></i> Asunto
              <span class="required">*</span>
            </label>
            <select id="subject" name="subject" class="form-select" required>
              <option value="">Selecciona una opción</option>
              <option value="queja">Queja o Sugerencia</option>
              <option value="pedido">Consulta de Pedido</option>
              <option value="evento">Reservación para Eventos</option>
              <option value="otro">Otro</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="reset" class="btn btn-secondary">
              <i class="bi bi-x-circle"></i> Limpiar
            </button>

            <!--CON ESTE BTN GUARDAS LOS MENSAJES EN LA BD-->
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-send"></i> Enviar Mensaje
            </button>
          </div>
        </form>
      </div>

      <div class="footer">
        <p>
          <a href="/" style="color: white; text-decoration: none"
            >← Volver al inicio</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
